<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting - Добро пожаловать</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            max-width: 800px;
            width: 90%;
            margin: 20px;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #4CAF50, #45a049, #2e7d32);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
            font-weight: 700;
            animation: fadeInDown 0.8s ease-out;
        }

        /* Языковая навигация */
        .language-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 30px 0 40px;
            padding: 20px 0;
            border-bottom: 2px solid rgba(76, 175, 80, 0.2);
            border-top: 2px solid rgba(76, 175, 80, 0.2);
        }

        .lang-link {
            text-decoration: none;
            font-size: 1.2em;
            font-weight: 600;
            padding: 10px 25px;
            border-radius: 50px;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .lang-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #764ba2, #667eea);
        }

        .lang-link:active {
            transform: translateY(0);
        }

        /* Контейнер для кнопок */
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        /* Стиль для всех кнопок */
        .nav-button {
            display: inline-block;
            text-decoration: none;
        }

        .nav-button button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        /* Анимация волны при наведении */
        .nav-button button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .nav-button button:hover::before {
            width: 300px;
            height: 300px;
        }

        .nav-button button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .nav-button button:active {
            transform: translateY(0);
        }

        /* Индивидуальные цвета для разных кнопок (опционально) */
        .nav-button.sport button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .nav-button.datetime button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .nav-button.recipe button {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            box-shadow: 0 5px 15px rgba(67, 233, 123, 0.4);
        }

        /* Анимации */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            animation: fadeInUp 0.8s ease-out;
        }

        .language-nav {
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .buttons-container {
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            .lang-link {
                font-size: 0.9em;
                padding: 8px 20px;
            }

            .nav-button button {
                padding: 10px 20px;
                font-size: 0.9em;
            }

            .language-nav {
                gap: 12px;
            }

            .buttons-container {
                gap: 10px;
            }
        }

        /* Эффект для активной языковой ссылки */
        .lang-link:active {
            transform: scale(0.95);
        }

        /* Декоративный элемент */
        .container::before {
            content: '✨';
            position: absolute;
            top: -15px;
            left: 20px;
            font-size: 2em;
            opacity: 0.3;
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ message }}</h1>

        <div class="language-nav">
            <a href="{% url 'hello_en' %}" class="lang-link">🇬🇧 English</a>
            <a href="{% url 'hello_fr' %}" class="lang-link">🇫🇷 Français</a>
            <a href="{% url 'hello_de' %}" class="lang-link">🇩🇪 Deutsch</a>
            <a href="{% url 'hello_es' %}" class="lang-link">🇪🇸 Español</a>
        </div>

        <div class="buttons-container">
            <a href="{% url 'sport' %}" class="nav-button sport">
                <button>⚽ О спорте</button>
            </a>
            <a href="{% url 'current_datetime' %}" class="nav-button datetime">
                <button>⏰ Дата и время</button>
            </a>
            <a href="{% url 'recipe_view' %}" class="nav-button recipe">
                <button>🍳 Рецепты</button>
            </a>
        </div>
    </div>
</body>
</html>
