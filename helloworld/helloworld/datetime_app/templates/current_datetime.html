<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Текущее время и дата</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            max-width: 600px;
            width: 90%;
            margin: 20px;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #007BFF, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .info-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        p {
            font-size: 1.3em;
            color: #333;
            margin: 15px 0;
            padding: 10px;
        }

        p strong {
            color: #007BFF;
            font-weight: 600;
        }

        .greeting {
            font-size: 2em;
            background: linear-gradient(135deg, #28a745, #20c997);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
            margin: 20px 0;
        }

        /* Красивая кнопка */
        .home-button {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
        }

        .home-button button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.1em;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .home-button button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .home-button button:hover::before {
            width: 300px;
            height: 300px;
        }

        .home-button button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .home-button button:active {
            transform: translateY(0);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            p {
                font-size: 1.1em;
            }

            .greeting {
                font-size: 1.5em;
            }

            .home-button button {
                padding: 12px 30px;
                font-size: 1em;
            }
        }

        /* Анимация появления */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            animation: fadeInUp 0.8s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ Текущее время и дата</h1>

        <div class="info-card">
            <p><strong>📅 Дата:</strong> {{ current_date }}</p>
            <p><strong>⏱️ Время:</strong> {{ current_time }}</p>
        </div>

        <div class="greeting">
            {{ greeting }}
        </div>

        <a href="{% url 'hello_en' %}" class="home-button">
            <button>🏠 На главную</button>
        </a>
    </div>
</body>
</html>
