<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Три кнопки</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            margin-top: 150px;
            background: #f0f0f0;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        button {
            font-size: 18px;
            padding: 12px 30px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn1 {
            background-color: #3498db;
            color: white;
        }

        .btn1:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }

        .btn2 {
            background-color: #e74c3c;
            color: white;
        }

        .btn2:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }

        .btn3 {
            background-color: #2ecc71;
            color: white;
        }

        .btn3:hover {
            background-color: #27ae60;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>🏠 Главная страница</h1>
    <h3>Выберите нужное приложение</h3>

    <div class="buttons">
        <button class="btn1" onclick="window.location.href='/app1/'">📊 Приложение 1</button>
        <button class="btn2" onclick="window.location.href='/app2/'">📅 Приложение 2</button>
        <button class="btn3" onclick="window.location.href='/app3/'">🕐 Приложение 3</button>
    </div>

    <p style="margin-top: 50px; color: #666;">Нажмите на кнопку для перехода</p>
</body>
</html>
