<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Список покупателей</title>
</head>
<body>
    <h1>Список покупателей</h1>
    <ul>
        {% for customer in customers %}
            <li>{{ customer.first_name }} {{ customer.last_name }} - {{ customer.phone }} - {{ customer.email }}</li>
        {% endfor %}
    </ul>
    <a href="{% url 'admin:index' %}">Назад в админку</a>
</body>
</html>
