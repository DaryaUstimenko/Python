<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Список товаров</title>
</head>
<body>
    <h1>Список товаров</h1>
    <ul>
        {% for product in products %}
            <li>{{ product.name }} - {{ product.description }} - На складе: {{ product.stock_quantity }} - Продано: {{ product.sold_quantity }}</li>
        {% endfor %}
    </ul>
    <a href="{% url 'admin:index' %}">Назад в админку</a>
</body>
</html>
