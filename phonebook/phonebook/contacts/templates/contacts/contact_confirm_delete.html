<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Удалить контакт</title>
</head>
<body>
    <h1>Удалить контакт</h1>
    <p>Вы уверены, что хотите удалить контакт {{ contact.first_name }} {{ contact.last_name }}?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Удалить</button>
        <a href="{% url 'contact_list' %}">Отмена</a>
    </form>
</body>
</html>
