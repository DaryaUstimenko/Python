<!-- templates/city/news.html -->
{% extends 'city/base.html' %}

{% block content %}
<h1 class="page-title">📰 Новости города</h1>

<div style="margin-bottom: 20px; color: #666;">
    Всего новостей: {{ total_news }}
</div>

<div style="display: flex; flex-direction: column; gap: 20px;">
    {% for news in news_list %}
    <div style="padding: 20px; border: 1px solid #e0e0e0; border-radius: 10px; transition: all 0.3s;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 10px;">
            <h3 style="color: #667eea; margin: 0;">{{ news.title }}</h3>
            <span style="background: #f0f0f0; padding: 5px 10px; border-radius: 5px; font-size: 0.9em;">
                {{ news.category }}
            </span>
        </div>
        <div style="color: #999; font-size: 0.9em; margin-bottom: 10px;">
            📅 {{ news.date }}
        </div>
        <p style="color: #666; line-height: 1.6;">{{ news.content }}</p>
    </div>
    {% endfor %}
</div>

<div style="margin-top: 30px; text-align: center; padding: 20px; background: #f8f9fa; border-radius: 10px;">
    <p>📧 По вопросам размещения новостей: <strong>news@city.ru</strong></p>
</div>
{% endblock %}
